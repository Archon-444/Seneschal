name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: seneschal
          POSTGRES_PASSWORD: seneschal
          POSTGRES_DB: seneschal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://seneschal:seneschal@localhost:5432/seneschal_test
      TEST_DATABASE_URL: postgresql://seneschal:seneschal@localhost:5432/seneschal_test
      APP_SECRET: ci-secret
      APP_BASE_URL: http://localhost:3000
      EMAIL_PROVIDER: console
      STORAGE_DRIVER: local
      EXTRACTION_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm exec prisma migrate deploy
      - run: pnpm fixtures:render
      - run: pnpm test
      - run: pnpm build
